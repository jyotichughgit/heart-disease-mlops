# =============================================================================
# monitoring/prometheus-grafana.yaml
# Deploys Prometheus + Grafana to GKE for API monitoring (Task 8)
# Usage: kubectl apply -f monitoring/prometheus-grafana.yaml
# =============================================================================

# ── Prometheus ConfigMap ──────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: mlops
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'heart-disease-api'
        static_configs:
          - targets: ['heart-disease-api-service:8000']
        metrics_path: /metrics

      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [mlops]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: $1

---
# ── Prometheus Deployment ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: mlops
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.47.0
          ports:
            - containerPort: 9090
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=7d"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: config
          configMap:
            name: prometheus-config

---
# ── Prometheus Service ────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: mlops
  labels:
    app: prometheus
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090

---
# ── Grafana ConfigMap (pre-built dashboard) ───────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: mlops
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-service:9090
        access: proxy
        isDefault: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: mlops
data:
  dashboard.yaml: |
    apiVersion: 1
    providers:
      - name: default
        folder: Heart Disease API
        type: file
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: mlops
data:
  heart-disease-api.json: |
    {
      "title": "Heart Disease API Monitoring",
      "uid": "heart-disease-api",
      "panels": [
        {
          "id": 1,
          "title": "Total API Requests",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [{"expr": "sum(api_requests_total)", "legendFormat": "Total Requests"}]
        },
        {
          "id": 2,
          "title": "Total Predictions",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [{"expr": "sum(predictions_total)", "legendFormat": "Total Predictions"}]
        },
        {
          "id": 3,
          "title": "Request Rate (per min)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "targets": [{"expr": "sum(rate(api_requests_total[1m])) * 60", "legendFormat": "Requests/min"}]
        },
        {
          "id": 4,
          "title": "API Request Rate Over Time",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [{"expr": "sum(rate(api_requests_total[1m])) by (endpoint)", "legendFormat": "{{endpoint}}"}]
        },
        {
          "id": 5,
          "title": "Request Latency (p95)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [{"expr": "histogram_quantile(0.95, rate(api_request_latency_seconds_bucket[5m]))", "legendFormat": "p95 latency"}]
        },
        {
          "id": 6,
          "title": "Predictions by Label",
          "type": "piechart",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [{"expr": "sum(predictions_total) by (prediction)", "legendFormat": "{{prediction}}"}]
        },
        {
          "id": 7,
          "title": "HTTP Status Codes",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [{"expr": "sum(rate(api_requests_total[1m])) by (status)", "legendFormat": "HTTP {{status}}"}]
        }
      ],
      "schemaVersion": 38,
      "version": 1,
      "refresh": "10s"
    }

---
# ── Grafana Deployment ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: mlops
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.1.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin123"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: datasource
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: datasource
          configMap:
            name: grafana-datasource
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard
          configMap:
            name: grafana-dashboard

---
# ── Grafana Service ───────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: mlops
  labels:
    app: grafana
spec:
  type: LoadBalancer
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
