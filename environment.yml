name: heart-disease-mlops
channels:
  - defaults
  - conda-forge

dependencies:
  - python=3.10
  - pip

  # Core ML
  - numpy>=1.26.0
  - pandas>=2.2.0
  - scikit-learn>=1.4.0
  - scipy>=1.13.0
  - matplotlib>=3.8.0
  - seaborn>=0.13.0

  # Notebook
  - ipykernel>=6.29.0
  - notebook>=7.1.0

  # Pip-only packages
  - pip:
    - mlflow>=3.0.0
    - fastapi>=0.111.0
    - uvicorn[standard]>=0.29.0
    - pydantic>=2.7.0
    - prometheus-client>=0.20.0
    - setuptools>=68.0.0
    - protobuf>=5.0,<7.0
    - pytest>=8.2.0
    - pytest-cov>=5.0.0
    - flake8>=7.0.0
    - black>=24.4.0
    - isort>=5.13.0
    - python-dotenv>=1.0.0
    - requests>=2.31.0
